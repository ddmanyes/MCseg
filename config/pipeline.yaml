global:
  project_name: MSseg
  log_level: INFO
  tissue: CRC
  tissue_profile: crc       # 參照 config/profiles/crc.yaml（換組織只需改此行）
paths:
  data_root: /Volumes/SSD/plan_a/tissue sample/CRC
  he_image: /Volumes/SSD/plan_a/tissue sample/CRC/visium/official_v4/Visium_HD_Human_Colon_Cancer_tissue_image.btf
  binned_002: /Volumes/SSD/plan_a/tissue sample/CRC/visium/official_v4/binned_outputs/binned_outputs/square_002um
  binned_008: /Volumes/SSD/plan_a/tissue sample/CRC/visium/official_v4/binned_outputs/binned_outputs/square_008um
  xenium_outs: /Volumes/SSD/plan_a/tissue sample/CRC/xenium/official_v1_addon/outs
  masks_dir: results/masks
  output_dir: results/analysis
  export_dir: results/export
  figure_dir: figures
rois:
- name: test
  tissue: CRC
  x: 48128
  y: 12657
  width_px: 1491
  height_px: 1210
  pixel_size_um: 0.2737
segmentation:
  mcseg_v2:
    # GPU / 批次
    use_gpu: true
    batch_size: 4
    # cyto3 多直徑集成
    dia_small: 13.0          # small cells（淋巴細胞等）
    dia_mid: 17.0            # 主要 pass（集成基底）
    dia_large: 22.0          # 大型細胞（上皮、巨噬細胞）
    # 可選 pass
    use_hematoxylin: true    # cyto3 on Ruifrok Hematoxylin 通道
    use_cpsam: false         # cpsam 集成（可選，顯著增加時間）
    # Voronoi 擴張
    voronoi_distance: 9      # px，約 2.5µm（VISIUM_UM_PX=0.2737）
    # 細胞過濾
    min_size: 20             # px²
    max_size: 6000           # px²
    # Cellpose 品質控制
    flow_threshold: 0.4
    cellprob_threshold: -2.0
    clahe_clip_limit: 3.0
    # 轉錄本密度補救（需 vhd_pseudo_transcripts.csv）
    use_transcript_rescue: true
  output:
    mask_filename: segmentation_masks.npy
    mask_tif_filename: segmentation_masks.tif
rna_counting:
  dilation_px: 6            # 1.64 µm — xenium_he_seg PQ=0.432 最佳參數

analysis:
  merge_rois: false
  preprocessing:
    cellular:
      min_genes: 20
      max_genes: 8000
      min_cells: 5
      max_pct_mito: 80.0
      min_complexity: 0.8          # [新增] 剔除低多樣性噪音 (log10 Genes / log10 Counts)
      mito_prefix: MT-
      min_counts: 5
    normalization:
      target_sum: 10000
      method: log1p
    hvg:
      n_top_genes: 2000
      flavor: seurat_v3
  clustering:
    n_pcs: 20
    n_neighbors: 15
    metric: euclidean
    method: leiden
    resolution: 0.5
    min_dist: 0.3
  visualization:
    figure_dpi: 300
    save_format: png
    color_palette: tab20
export:
  xenium:
    pixel_size_um: 0.2645833
    smooth_polygons: true
    simplify_tolerance: 0.4
  loupe:
    whitelist_path: backend/src/export/10x_whitelist.txt
    max_categories: 32000
# marker_genes 已移至 config/profiles/crc.yaml（由 tissue_profile 自動載入）
# 若需要 project 專屬覆寫，可在此處加入同名 key
